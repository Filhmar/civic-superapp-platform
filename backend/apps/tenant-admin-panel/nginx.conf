server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy API calls to the gateway over the compose network so the SPA
  # talks to the backend SAME-ORIGIN (no CORS, first-party auth). The image is
  # built with VITE_API_URL="" so the app fetches /v1/... on this same host, and
  # nginx forwards it to api-gateway:3005 internally. `resolver` + a variable let
  # nginx start even if the gateway isn't up yet and survive it being recreated.
  location /v1/ {
    resolver 127.0.0.11 valid=30s;
    set $api_gateway api-gateway;
    proxy_pass http://$api_gateway:3005;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }
  location /index.html {
    add_header Cache-Control "no-store";
  }
}
